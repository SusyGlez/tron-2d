<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TRON Light Cycles</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Start Screen -->
    <div id="start-screen">
      <div class="start-content">
        <h1 class="start-title">TRON</h1>
        <div class="start-subtitle">LIGHT CYCLES</div>
        <div class="start-controls">
          <div class="control-group">
            <span class="control-label">PLAYER 1</span>
            <span class="control-keys">W A S D</span>
          </div>
          <div class="control-group">
            <span class="control-label">PLAYER 2</span>
            <span class="control-keys">↑ ← ↓ →</span>
          </div>
        </div>
        <div class="start-powerups">
          <div class="powerup-legend-title">POWERUPS</div>
          <div class="powerup-legend">
            <span class="powerup-item"
              ><span class="pu-icon pu-speed">⚡</span> Speed Boost</span
            >
            <span class="powerup-item"
              ><span class="pu-icon pu-shield">🛡</span> Shield</span
            >
            <span class="powerup-item"
              ><span class="pu-icon pu-clear">💥</span> Trail Clear</span
            >
            <span class="powerup-item"
              ><span class="pu-icon pu-slow">🐢</span> Slowdown</span
            >
          </div>
        </div>
        <button id="start-btn" class="neon-btn start-btn">START GAME</button>
        <div class="start-hint">or press ENTER</div>
      </div>
    </div>

    <!-- Game Canvas -->
    <canvas id="gameCanvas"></canvas>

    <!-- HUD Overlay -->
    <div id="hud">
      <!-- Player 1 Lives (top-left) -->
      <div id="p1-lives" class="lives-display lives-left">
        <span class="lives-label">P1</span>
        <span class="lives-icons" data-player="1"></span>
        <span class="effect-icons" id="p1-effects"></span>
      </div>

      <!-- Player 2 Lives (top-right) -->
      <div id="p2-lives" class="lives-display lives-right">
        <span class="lives-label">P2</span>
        <span class="lives-icons" data-player="2"></span>
        <span class="effect-icons" id="p2-effects"></span>
      </div>

      <!-- Centre Message Area (countdown, round result, match winner) -->
      <div id="message-overlay">
        <div id="countdown" class="message hidden"></div>
        <div id="round-result" class="message hidden"></div>
        <div id="match-result" class="message hidden">
          <div id="match-winner-text"></div>
          <button id="restart-btn" class="neon-btn">PLAY AGAIN</button>
          <div class="restart-hint">or press ENTER</div>
        </div>
      </div>

      <!-- Pause overlay -->
      <div id="pause-overlay" class="hidden">
        <div class="pause-text">PAUSED</div>
        <div class="pause-hint">Press P or ESC to resume</div>
      </div>
    </div>

    <!-- Control Buttons -->
    <button id="pause-btn" class="neon-btn pause-btn" title="Pause (P)">
      <span id="pause-icon">⏸</span>
    </button>
    <button id="mute-btn" class="neon-btn mute-btn" title="Toggle Audio (M)">
      <span id="mute-icon">🔊</span>
    </button>

    <script src="game.js"></script>
  </body>
</html>
